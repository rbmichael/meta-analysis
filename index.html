<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meta-analysis Tool</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="js/analysis.js"></script>
<script src="js/trimfill.js"></script>
<script src="js/plots.js"></script>
<script src="js/ui.js"></script>
</head>
<body>

<h2>Meta-analysis Tool</h2>

<input type="file" id="csvFile" accept=".csv">
<button onclick="importCSV()">Import CSV</button>
<button onclick="exportCSV()">Export CSV</button>

<select id="effectType" onchange="runAnalysis()">
<option value="MD">Mean Difference</option>
<option value="SMD">Hedges g</option>
</select>

<table id="inputTable">
<tr>
<th>Study</th><th>Mean₁</th><th>SD₁</th><th>n₁</th>
<th>Mean₂</th><th>SD₂</th><th>n₂</th>
</tr>
</table>

<button onclick="addRow()">Add Study</button>
<button onclick="runAnalysis()">Run</button>

<div id="results"></div>

<svg id="forestPlot" width="900" height="420"></svg>
<svg id="funnelPlot" width="500" height="400"></svg>

<div class="tooltip" id="tooltip"></div>

</body>
</html>
