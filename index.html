<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meta-analysis Tool (Publication-ready v11)</title>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body { font-family: Arial; background:#121212; color:#eee; margin:20px; }
table { border-collapse: collapse; margin-bottom: 20px; }
th, td { border: 1px solid #444; padding:6px; text-align:center; }
input, select { width:70px; background:#1e1e1e; color:#eee; border:1px solid #555; }
button { padding:6px 12px; margin:5px; background:#333; color:white; border:none; cursor:pointer; }
.tooltip {
 position:absolute;
 background:#222;
 color:#fff;
 padding:6px;
 border:1px solid #555;
 border-radius:4px;
 font-size:12px;
 pointer-events:none;
 opacity:0;
}
</style>
</head>

<body>

<h2>Meta-analysis Tool (Publication-ready v11)</h2>

<input type="file" id="csvFile" accept=".csv">
<button onclick="importCSV()">Import CSV</button>
<button onclick="exportCSV()">Export CSV</button>

<select id="effectType" onchange="runAnalysis()">
<option value="MD">Mean Difference</option>
<option value="SMD">Hedges g</option>
</select>

<table id="inputTable">
<tr>
<th>Study</th><th>Mean₁</th><th>SD₁</th><th>n₁</th>
<th>Mean₂</th><th>SD₂</th><th>n₂</th>
</tr>
</table>

<button onclick="addRow()">Add Study</button>
<button onclick="runAnalysis()">Run</button>

<div id="results"></div>

<svg id="forestPlot" width="900" height="420"></svg>
<svg id="funnelPlot" width="500" height="400"></svg>

<div class="tooltip" id="tooltip"></div>

<script>
const MIN_VAR=1e-8;

// ================= UI =================
function addRow(values){
 const row=document.getElementById("inputTable").insertRow();
 const v=values||["","","","","","",""];
 row.innerHTML=`<td><input value="${v[0]||""}"></td>
 <td><input value="${v[1]||""}"></td>
 <td><input value="${v[2]||""}"></td>
 <td><input value="${v[3]||""}"></td>
 <td><input value="${v[4]||""}"></td>
 <td><input value="${v[5]||""}"></td>
 <td><input value="${v[6]||""}"></td>`;
}

function init(){
 addRow(["A",10,2,50,8,2,50]);
 addRow(["B",12,3,40,9,3,40]);
 addRow(["C",9,2,30,7,2,30]);
 runAnalysis();
}
window.onload=init;

function importCSV(){
 const file=document.getElementById('csvFile').files[0];
 if(!file) return;
 const reader=new FileReader();
 reader.onload=e=>{
  const rows=e.target.result.split('\n').slice(1);
  rows.forEach(r=>{
   const v=r.split(',');
   if(v.length>=7) addRow(v);
  });
  runAnalysis();
 };
 reader.readAsText(file);
}

function exportCSV(){
 let rows=["Study,Mean1,SD1,n1,Mean2,SD2,n2"];
 document.querySelectorAll("#inputTable tr").forEach((r,i)=>{
  if(i===0) return;
  const vals=[...r.querySelectorAll('input')].map(x=>x.value);
  if(vals.some(v=>v!=="")) rows.push(vals.join(','));
 });
 const blob=new Blob([rows.join('\n')]);
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download="meta_data.csv";
 a.click();
}

// ================= STATS =================
function hedgesG(s){
 const sp=Math.sqrt(((s.n1-1)*s.sd1**2+(s.n2-1)*s.sd2**2)/(s.n1+s.n2-2));
 const d=(s.m1-s.m2)/sp;
 const J=1-(3/(4*(s.n1+s.n2)-9));
 const g=J*d;
 const varg=(s.n1+s.n2)/(s.n1*s.n2)+(g*g)/(2*(s.n1+s.n2-2));
 return {es:g,var:Math.max(varg,MIN_VAR)};
}

function compute(s,type){
 if(type==="SMD"){
  const g=hedgesG(s);
  return {...s,md:g.es,varMD:g.var,se:Math.sqrt(g.var),w:1/g.var};
 }
 const varMD=Math.max((s.sd1**2)/s.n1+(s.sd2**2)/s.n2,MIN_VAR);
 return {...s,md:s.m1-s.m2,varMD,se:Math.sqrt(varMD),w:1/varMD};
}

function meta(studies){
 const W=d3.sum(studies,d=>d.w);
 const FE=d3.sum(studies,d=>d.md*d.w)/W;
 const seFE=Math.sqrt(1/W);

 const Q=d3.sum(studies,d=>d.w*(d.md-FE)**2);
 const df=studies.length-1;
 const I2=Q>df?((Q-df)/Q)*100:0;

 const sumW2=d3.sum(studies,d=>d.w*d.w);
 const C=W-(sumW2/W);
 const tau2=C>0?Math.max(0,(Q-df)/C):0;

 const wRE=studies.map(d=>1/(d.varMD+tau2));
 const WRE=d3.sum(wRE);
 const RE=d3.sum(studies.map((d,i)=>d.md*wRE[i]))/WRE;
 const seRE=Math.sqrt(1/WRE);

 return {FE,seFE,RE,seRE,tau2,Q,df,I2,
  predLow:RE-1.96*Math.sqrt(seRE*seRE+tau2),
  predHigh:RE+1.96*Math.sqrt(seRE*seRE+tau2)};
}

// ================= TRIM-FILL =================
function trimFill(studies){
 if(studies.length<3) return [];
 const center=d3.median(studies,d=>d.md);
 let left=studies.filter(d=>d.md<center);
 let right=studies.filter(d=>d.md>center);
 let missing=Math.abs(left.length-right.length);
 let source=left.length>right.length?left:right;

 return source.slice(0,missing).map(d=>({
  ...d,
  md:2*center-d.md,
  filled:true,
  label:d.label+" (filled)"
 }));
}

// ================= ANALYSIS =================
function runAnalysis(){
 const type=document.getElementById("effectType").value;
 const rows=document.querySelectorAll("#inputTable tr");

 let studies=[];
 for(let i=1;i<rows.length;i++){
  const v=[...rows[i].querySelectorAll('input')].map(x=>x.value);
  if(v.slice(1).some(x=>x===""||isNaN(x))) continue;

  studies.push(compute({
   label:v[0],
   m1:+v[1],sd1:+v[2],n1:+v[3],
   m2:+v[4],sd2:+v[5],n2:+v[6]
  },type));
 }

 if(!studies.length) return;

 const m=meta(studies);
 const tf=trimFill(studies);
 const all=[...studies,...tf];

 document.getElementById("results").innerHTML=`
 <b>FE:</b> ${m.FE.toFixed(3)} |
 <b>RE:</b> ${m.RE.toFixed(3)}<br>
 τ²=${m.tau2.toFixed(3)} | I²=${m.I2.toFixed(1)}%<br>
 Prediction=[${m.predLow.toFixed(3)}, ${m.predHigh.toFixed(3)}]
 `;

 drawForest(all,m);
 drawFunnel(all,m);
}

// ================= FOREST =================
function drawForest(studies,m){
 const svg=d3.select("#forestPlot"); svg.selectAll("*").remove();
 const tooltip=d3.select("#tooltip");

 const x=d3.scaleLinear()
  .domain(d3.extent(studies.flatMap(d=>[d.md-1.96*d.se,d.md+1.96*d.se])))
  .nice().range([100,800]);

 const y=d3.scaleBand()
  .domain(studies.map(d=>d.label))
  .range([20,300]).padding(0.4);

 svg.append("line")
  .attr("x1",x(0)).attr("x2",x(0))
  .attr("y1",0).attr("y2",350)
  .attr("stroke","white").attr("stroke-dasharray","4");

 svg.selectAll("line.ci")
  .data(studies).enter().append("line")
  .attr("x1",d=>x(d.md-1.96*d.se))
  .attr("x2",d=>x(d.md+1.96*d.se))
  .attr("y1",d=>y(d.label))
  .attr("y2",d=>y(d.label))
  .attr("stroke","white");

 const wMax=d3.max(studies,d=>d.w);

 svg.selectAll("rect")
  .data(studies).enter().append("rect")
  .attr("x",d=>x(d.md)-Math.sqrt(d.w/wMax)*10)
  .attr("y",d=>y(d.label)-5)
  .attr("width",d=>Math.sqrt(d.w/wMax)*20)
  .attr("height",10)
  .attr("fill",d=>d.filled?"none":"white")
  .attr("stroke","white")
  .on("mousemove",(e,d)=>{
   tooltip.style("opacity",1)
    .html(`${d.label}<br>${d.md.toFixed(2)}<br>CI: ${(d.md-1.96*d.se).toFixed(2)}–${(d.md+1.96*d.se).toFixed(2)}`)
    .style("left",(e.pageX+10)+"px")
    .style("top",(e.pageY-20)+"px");
  })
  .on("mouseout",()=>tooltip.style("opacity",0));

 svg.append("g").attr("transform","translate(0,350)").call(d3.axisBottom(x));
 svg.append("g").attr("transform","translate(100,0)").call(d3.axisLeft(y));
}

// ================= FUNNEL =================
function drawFunnel(studies,m){
 const svg=d3.select("#funnelPlot"); svg.selectAll("*").remove();

 const x=d3.scaleLinear()
  .domain(d3.extent(studies,d=>d.md)).nice()
  .range([50,450]);

 const y=d3.scaleLinear()
  .domain([d3.max(studies,d=>d.se),0])
  .range([350,50]);

 svg.selectAll("circle")
  .data(studies).enter().append("circle")
  .attr("cx",d=>x(d.md))
  .attr("cy",d=>y(d.se))
  .attr("r",4)
  .attr("fill",d=>d.filled?"none":"white")
  .attr("stroke","white");

 svg.append("line")
  .attr("x1",x(m.RE)).attr("x2",x(m.RE))
  .attr("y1",50).attr("y2",350)
  .attr("stroke","cyan").attr("stroke-dasharray","4");

 svg.append("g").attr("transform","translate(0,350)").call(d3.axisBottom(x));
 svg.append("g").attr("transform","translate(50,0)").call(d3.axisLeft(y));
}
</script>

</body>
</html>
